<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Co-Founder Therapy</title>
<meta name="description" content="A deck of prompts to help co-founders have the conversations they keep avoiding.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #ffffff;
    --paper: #000000;
    --bg: #1b1b1c;
    --bg-2: #232325;
    --muted: rgba(255,255,255,0.55);
    --muted-2: rgba(255,255,255,0.32);
    --hairline: rgba(255,255,255,0.22);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(1100px 700px at 50% -10%, #2c2c2f 0%, #1b1b1c 60%, #141415 100%);
    color: #eee;
    font-family: 'Figtree', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  .app {
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(12px, 2.3vw, 22px) clamp(16px, 3vw, 28px) clamp(14px, 2vw, 20px);
    gap: clamp(8px, 1.4vw, 14px);
    box-sizing: border-box;
  }

  /* ----------- Header ----------- */
  header.bar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    color: #ddd;
  }
  header .brand {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(17px, 2.4vw, 23px);
    letter-spacing: 0.005em;
    color: #fff;
  }
  header .meta {
    font-family: 'Figtree', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted-2);
    font-variant-numeric: tabular-nums;
  }
  header .meta strong { color: #fff; font-weight: 500; }

  /* ----------- Stage ----------- */
  .stage {
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1800px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 0;
    padding-bottom: clamp(12px, 1.8vw, 20px);
  }

  .card {
    --ratio: 2.43 / 3.26;
    height: 100%;
    aspect-ratio: var(--ratio);
    max-width: 82vw;
    max-height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(.2,.7,.2,1);
    cursor: pointer;
    will-change: transform;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.no-flip-anim { transition: none !important; }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.55),
      0 8px 18px rgba(0,0,0,0.35),
      inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  /* ----------- Front (closed) ----------- */
  .face.front {
    background:
      radial-gradient(120% 80% at 50% 0%, #2a2a2c 0%, #1a1a1b 60%, #101011 100%);
    color: #fff;
    padding: clamp(20px, 3.2vw, 32px);
    display: grid;
    grid-template-rows: auto 1fr auto;
  }
  .face.front::before {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 12px;
    border: 1px solid var(--hairline);
    pointer-events: none;
  }
  .face.front .top, .face.front .bottom {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted-2);
    z-index: 1;
  }
  .face.front .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: clamp(10px, 1.5vw, 16px);
    z-index: 1;
  }
  .face.front .center .mark {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(34px, 6vw, 56px);
    line-height: 1;
    letter-spacing: 0.005em;
  }
  .face.front .center .sub {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .face.front .center .rule {
    width: 38%;
    height: 1px;
    background: var(--hairline);
  }

  /* ----------- Back (prompt) ----------- */
  .face.back {
    transform: rotateY(180deg);
    background:
      linear-gradient(180deg, #f7f3ec 0%, #ebe5d8 100%);
    color: #1a1a1b;
    padding: clamp(22px, 3.4vw, 36px);
    display: grid;
    grid-template-rows: auto 1fr auto;
  }
  .face.back::before {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.12);
    pointer-events: none;
  }
  .face.back .tag {
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.5);
    z-index: 1;
    display: flex;
    justify-content: space-between;
  }
  .face.back .prompt {
    z-index: 1;
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(22px, 3.6vw, 36px);
    line-height: 1.18;
    letter-spacing: 0.002em;
    align-self: center;
    padding: 0 clamp(4px, 1vw, 10px);
  }
  .face.back .prompt .lede {
    font-style: italic;
    color: rgba(0,0,0,0.55);
    display: block;
    font-size: 0.42em;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 0.9em;
    font-family: 'Figtree', sans-serif;
    font-weight: 500;
  }
  .face.back .footnote {
    z-index: 1;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.45);
    display: flex;
    justify-content: space-between;
  }

  /* ----------- Controls ----------- */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    color: #ddd;
  }
  .controls .left, .controls .right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn {
    appearance: none;
    background: transparent;
    border: 1px solid var(--hairline);
    color: #fff;
    font-family: 'Figtree', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
  }
  .btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.4); }
  .btn:active { transform: translateY(1px); }
  .btn.icon {
    width: 40px; height: 40px; padding: 0; display: inline-flex; align-items: center; justify-content: center;
  }
  .btn svg { width: 14px; height: 14px; }
  .progress {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .progress strong { color: #fff; font-weight: 500; }

  .hint {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted-2);
    margin-top: 4px;
  }

  /* ----------- Mobile ----------- */
  @media (max-width: 520px) {
    .controls .label { display: none; }
    .btn { padding: 10px 12px; }
    .face.front .center .mark { font-size: 36px; }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="bar">
      <div class="brand">Co-Founder Therapy</div>
      <div class="meta"><strong id="deckName">Honest Deck</strong> &nbsp;·&nbsp; <span id="cardCount">52 cards</span></div>
    </header>

    <main class="stage">
      <div class="card" id="card" role="button" aria-label="Flip card" tabindex="0">
        <div class="face front">
          <div class="top">
            <span>No. <span id="frontNo">01</span></span>
            <span id="frontCategory">Trust</span>
          </div>
          <div class="center">
            <div class="rule"></div>
            <div class="mark">Co&#8209;Founder<br>Therapy</div>
            <div class="sub">Tap to reveal</div>
            <div class="rule"></div>
          </div>
          <div class="bottom">
            <span>Honest Deck</span>
            <span>v1</span>
          </div>
        </div>

        <div class="face back">
          <div class="tag">
            <span id="backCategory">Trust</span>
            <span>No. <span id="backNo">01</span></span>
          </div>
          <div class="prompt">
            <span class="lede">Ask each other</span>
            <span id="promptText">What's something you've been holding back from telling me?</span>
          </div>
          <div class="footnote">
            <span>Take turns answering</span>
            <span>No interrupting</span>
          </div>
        </div>
      </div>
    </main>

    <div class="controls">
      <div class="left">
        <button class="btn icon" id="prevBtn" aria-label="Previous card" title="Previous">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <button class="btn" id="shuffleBtn" title="Shuffle the deck">
          <span class="label">Shuffle</span>
          <span style="display:none">⤨</span>
        </button>
      </div>

      <div class="progress"><strong id="indexNow">01</strong> / <span id="indexTotal">52</span></div>

      <div class="right">
        <button class="btn" id="flipBtn">
          <span class="label">Flip</span>
        </button>
        <button class="btn icon" id="nextBtn" aria-label="Next card" title="Next">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
    </div>
  </div>

<script>
  const DECK = [
    { c: "Trust",      q: "What's something you've been holding back from telling me?" },
    { c: "Trust",      q: "When was the last time you didn't trust my judgment, and why?" },
    { c: "Trust",      q: "What would I have to do to lose your trust completely?" },
    { c: "Trust",      q: "Where do I show up for you, and where do I go missing?" },
    { c: "Trust",      q: "What's one assumption you make about me that you've never checked?" },

    { c: "Money",      q: "If we sold for a life-changing amount tomorrow, what would change between us?" },
    { c: "Money",      q: "What's the smallest outcome you could live with from this company?" },
    { c: "Money",      q: "How would we handle it if one of us needed to take money out early?" },
    { c: "Money",      q: "Do our equity splits still feel fair? Be specific." },
    { c: "Money",      q: "What's a financial decision we made that you'd quietly redo?" },

    { c: "Power",      q: "Who actually has the final say, and does that match what we tell people?" },
    { c: "Power",      q: "When do you feel overruled, and how often does it happen?" },
    { c: "Power",      q: "What's a decision you made alone that should have been ours?" },
    { c: "Power",      q: "Where am I taking up too much oxygen?" },
    { c: "Power",      q: "If we hired a CEO above us, what would they fix in week one?" },

    { c: "Vision",     q: "Are we still building the same company we started?" },
    { c: "Vision",     q: "If this fails, what story do you want to tell about why?" },
    { c: "Vision",     q: "What's a future you're imagining that I don't know about?" },
    { c: "Vision",     q: "What would make you walk away from this in the next year?" },
    { c: "Vision",     q: "What's the version of success that would feel hollow to you?" },

    { c: "Conflict",   q: "What's a fight we keep having underneath every other fight?" },
    { c: "Conflict",   q: "When I'm upset with you, how do you usually find out?" },
    { c: "Conflict",   q: "What do I do that makes you shut down?" },
    { c: "Conflict",   q: "What's a conversation we keep postponing?" },
    { c: "Conflict",   q: "Is there something I did months ago that you haven't let go of?" },

    { c: "Work",       q: "Am I pulling my weight? Tell me where I'm not." },
    { c: "Work",       q: "What's the part of my role that you secretly think I'm bad at?" },
    { c: "Work",       q: "Where am I a bottleneck for you right now?" },
    { c: "Work",       q: "What's something you wish I'd just stop doing?" },
    { c: "Work",       q: "If you could quietly take one thing off my plate, what would it be?" },

    { c: "Life",       q: "What's happening outside this company that's costing you energy?" },
    { c: "Life",       q: "What does a sustainable week look like for you, honestly?" },
    { c: "Life",       q: "When did you last feel proud of what we're doing?" },
    { c: "Life",       q: "What are you sacrificing for this that I don't see?" },
    { c: "Life",       q: "If you took a real two-week break, what would you be afraid would happen?" },

    { c: "People",     q: "Is there anyone on the team we should have let go three months ago?" },
    { c: "People",     q: "Who do we disagree about, and have we ever said it out loud?" },
    { c: "People",     q: "What are people on the team afraid to tell us?" },
    { c: "People",     q: "Which of our hires do you privately regret?" },
    { c: "People",     q: "Where am I a worse manager than you think I realize?" },

    { c: "Endings",    q: "Under what conditions would you want to dissolve this partnership?" },
    { c: "Endings",    q: "If one of us left, what's the cleanest way that could happen?" },
    { c: "Endings",    q: "What do you want to be true about how we end, whenever it ends?" },
    { c: "Endings",    q: "Is there a version of this where we stay friends after?" },
    { c: "Endings",    q: "What's the thing you'd never want me to say in public about this company?" },

    { c: "Repair",     q: "What's something I owe you an apology for?" },
    { c: "Repair",     q: "What's something you owe me an apology for?" },
    { c: "Repair",     q: "How do we know when we're actually okay again, not just past it?" },
    { c: "Repair",     q: "What's one promise you want from me by the end of this conversation?" },
    { c: "Repair",     q: "What's one thing you appreciate about me that I'd be surprised to hear?" },
    { c: "Repair",     q: "If we made it ten more years, what would you want to remember about right now?" },
  ];

  const $ = (id) => document.getElementById(id);
  const card = $("card");
  const frontNo = $("frontNo");
  const frontCat = $("frontCategory");
  const backNo = $("backNo");
  const backCat = $("backCategory");
  const promptText = $("promptText");
  const indexNow = $("indexNow");
  const indexTotal = $("indexTotal");
  const cardCount = $("cardCount");

  let order = DECK.map((_, i) => i);
  let pos = 0;

  const pad = (n) => String(n).padStart(2, "0");

  function render(opts = {}) {
    const item = DECK[order[pos]];
    const num = pad(pos + 1);
    frontNo.textContent = num;
    backNo.textContent = num;
    frontCat.textContent = item.c;
    backCat.textContent = item.c;
    promptText.textContent = item.q;
    indexNow.textContent = num;
    indexTotal.textContent = pad(DECK.length);
    cardCount.textContent = DECK.length + " cards";
  }

  function setFlipped(state, animate = true) {
    if (!animate) card.classList.add("no-flip-anim");
    card.classList.toggle("flipped", state);
    if (!animate) {
      requestAnimationFrame(() => requestAnimationFrame(() => card.classList.remove("no-flip-anim")));
    }
  }

  function step(delta) {
    setFlipped(false, true);
    setTimeout(() => {
      pos = (pos + delta + DECK.length) % DECK.length;
      render();
    }, card.classList.contains("flipped") ? 350 : 0);
  }

  function shuffle() {
    setFlipped(false, true);
    setTimeout(() => {
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      pos = 0;
      render();
    }, card.classList.contains("flipped") ? 350 : 0);
  }

  card.addEventListener("click", () => setFlipped(!card.classList.contains("flipped")));
  card.addEventListener("keydown", (e) => {
    if (e.key === " " || e.key === "Enter") {
      e.preventDefault();
      setFlipped(!card.classList.contains("flipped"));
    }
  });

  $("flipBtn").addEventListener("click", (e) => { e.stopPropagation(); setFlipped(!card.classList.contains("flipped")); });
  $("prevBtn").addEventListener("click", (e) => { e.stopPropagation(); step(-1); });
  $("nextBtn").addEventListener("click", (e) => { e.stopPropagation(); step(1); });
  $("shuffleBtn").addEventListener("click", (e) => { e.stopPropagation(); shuffle(); });

  document.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    if (e.key === "ArrowRight") step(1);
    else if (e.key === "ArrowLeft") step(-1);
    else if (e.key.toLowerCase() === "s") shuffle();
  });

  let touchStartX = null;
  card.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
  card.addEventListener("touchend", (e) => {
    if (touchStartX == null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0) step(1); else step(-1);
    }
    touchStartX = null;
  }, { passive: true });

  render();
</script>
</body>
</html>
