  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-family: 'Instrument Serif';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"95aa6823-44f8-420e-a1b7-e6302e678230\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"2a88cb91-6ba4-4320-a87c-da80a01e73cf\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"bbf4337b-44b7-43bd-ae82-cfc841fd1f55\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --ink: #ffffff;\n    --paper: #000000;\n    --bg: #1b1b1c;\n    --bg-2: #232325;\n    --muted: rgba(255,255,255,0.55);\n    --muted-2: rgba(255,255,255,0.32);\n    --hairline: rgba(255,255,255,0.22);\n  }\n\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0;\n    padding: 0;\n    background:\n      radial-gradient(1100px 700px at 50% -10%, #2c2c2f 0%, #1b1b1c 60%, #141415 100%);\n    color: #eee;\n    font-family: 'Figtree', system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n    min-height: 100vh;\n    overscroll-behavior: none;\n  }\n\n  html, body {\n    height: 100%;\n    overflow: hidden;\n  }\n\n  .app {\n    height: 100vh;\n    display: grid;\n    grid-template-rows: auto 1fr auto;\n    padding: clamp(12px, 2.3vw, 22px) clamp(16px, 3vw, 28px) clamp(14px, 2vw, 20px);\n    gap: clamp(8px, 1.4vw, 14px);\n    box-sizing: border-box;\n  }\n\n  /* ----------- Header ----------- */\n  header.bar {\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    gap: 16px;\n    color: #ddd;\n  }\n  header .brand {\n    font-family: 'Instrument Serif', serif;\n    font-style: italic;\n    font-weight: 400;\n    font-size: clamp(17px, 2.4vw, 23px);\n    letter-spacing: 0.005em;\n    color: #fff;\n  }\n  header .meta {\n    font-family: 'Figtree', sans-serif;\n    font-size: 11px;\n    text-transform: uppercase;\n    letter-spacing: 0.18em;\n    color: var(--muted-2);\n    font-variant-numeric: tabular-nums;\n  }\n  header .meta strong { color: #fff; font-weight: 500; }\n\n  /* ----------- Stage ----------- */\n  .stage {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    perspective: 1800px;\n    user-select: none;\n    -webkit-tap-highlight-color: transparent;\n    min-height: 0; /* let card shrink to fit grid track */\n    padding-bottom: clamp(12px, 1.8vw, 20px); /* breathing room under card */\n  }\n\n  /* Card sizing — fixed vertical (portrait) aspect ratio.\n     Height is sized off the available stage area; the stage flex layout takes over. */\n  .card {\n    --ratio: 2.43 / 3.26;     /* width / height */\n    height: 100%;\n    aspect-ratio: var(--ratio);\n    max-width: 82vw;\n    /* belt-and-suspenders so it doesn't escape on weird viewports */\n    max-height: 100%;\n    position: relative;\n    transform-style: preserve-3d;\n    transition: transform 0.7s cubic-bezier(.2,.7,.2,1);\n    cursor: pointer;\n    will-change: transform;\n  }\n  .card.flipped { transform: rotateY(180deg); }\n\n  /* Disable the flip transition during a navigation swap so the card never\n     animates between front/back when state is mutated mid-fade. */\n  .card.no-flip-anim { transition: none !important; }\n\n  /* Subtle entry/exit fade when navigating. Pure opacity — must NOT touch\n     transform, or it would fight the rotateY(180deg) on flipped cards. */\n  .card.swap-out { animation: swapOut 0.22s ease forwards; }\n  .card.swap-in  { animation: swapIn 0.32s ease forwards; }\n  @keyframes swapOut {\n    from { opacity: 1; }\n    to   { opacity: 0; }\n  }\n  @keyframes swapIn {\n    from { opacity: 0; }\n    to   { opacity: 1; }\n  }\n\n  .face {\n    position: absolute;\n    inset: 0;\n    background: var(--paper);\n    color: var(--ink);\n    border-radius: 14px;\n    overflow: hidden;\n    backface-visibility: hidden;\n    -webkit-backface-visibility: hidden;\n    transform: translateZ(0); /* own 3D layer so backface culling works reliably */\n    box-shadow:\n      0 30px 60px -20px rgba(0,0,0,0.6),\n      0 10px 20px -10px rgba(0,0,0,0.5),\n      0 0 0 1px rgba(255,255,255,0.04) inset;\n  }\n  .face::before {\n    content: \"\";\n    position: absolute;\n    inset: 14px;\n    border: 0.5px solid var(--hairline);\n    border-radius: 8px;\n    pointer-events: none;\n    z-index: 2;\n  }\n\n  .face.back {\n    transform: rotateY(180deg) translateZ(0);\n  }\n\n  /* Hard-hide the inactive face ONLY at rest (after the flip settles). During\n     the flip, both faces stay visible so backface-visibility can do its job\n     without the rotating face being clipped mid-transition. */\n  .card.settled:not(.flipped) .face.back  { visibility: hidden; }\n  .card.settled.flipped       .face.front { visibility: hidden; }\n\n  /* ----------- Front ----------- */\n  .front-content {\n    position: absolute;\n    inset: 0;\n    padding: clamp(22px, 5%, 38px);\n    display: flex;\n    flex-direction: column;\n    justify-content: space-between;\n    z-index: 1;\n  }\n  .front-top {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-start;\n    gap: 14px;\n  }\n  .category {\n    font-family: 'Instrument Serif', serif;\n    font-style: italic;\n    font-weight: 400;\n    font-size: clamp(16px, 2.4vw, 22px);\n    line-height: 1.1;\n    color: #fff;\n    max-width: 75%;\n  }\n  .number {\n    font-family: 'Figtree', sans-serif;\n    font-weight: 400;\n    font-size: clamp(10px, 1.4vw, 12px);\n    letter-spacing: 0.18em;\n    color: var(--muted);\n    font-variant-numeric: tabular-nums;\n    white-space: nowrap;\n  }\n  .question {\n    font-family: 'Figtree', sans-serif;\n    font-weight: 500;\n    font-size: clamp(18px, 2.7vw, 26px);\n    line-height: 1.28;\n    letter-spacing: -0.005em;\n    color: #fff;\n    text-wrap: pretty;\n    margin-top: 18px;\n  }\n  .front-bottom {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-end;\n    font-family: 'Figtree', sans-serif;\n    font-size: clamp(9px, 1.2vw, 11px);\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .front-bottom .brand {\n    font-family: 'Instrument Serif', serif;\n    font-style: italic;\n    text-transform: none;\n    letter-spacing: 0;\n    font-size: clamp(12px, 1.5vw, 14px);\n    color: var(--muted);\n  }\n  .hint {\n    position: absolute;\n    bottom: 14px;\n    left: 0;\n    right: 0;\n    text-align: center;\n    font-family: 'Figtree', sans-serif;\n    font-size: 9px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--muted-2);\n    pointer-events: none;\n    z-index: 3;\n    opacity: 0;\n    transition: opacity 0.4s ease;\n  }\n  /* Hint is shown only on the very first card, before any interaction. */\n  body.show-hint .hint { opacity: 0.9; }\n\n  /* ----------- Back (diagonal text pattern) ----------- */\n  .pattern {\n    position: absolute;\n    top: -50%; left: -50%;\n    width: 200%; height: 200%;\n    transform: rotate(-45deg);\n    transform-origin: center center;\n    overflow: hidden;\n    user-select: none;\n    z-index: 0;\n  }\n  .pattern .row {\n    display: block;\n    white-space: nowrap;\n    font-family: 'Instrument Serif', serif;\n    font-style: normal;\n    font-weight: 400;\n    font-size: clamp(28px, 4.2vw, 44px);\n    line-height: 1.55;\n    color: #fff;\n    text-align: center;\n  }\n  .pattern .row .word { display: inline-block; margin: 0 0.18em; }\n\n  /* ----------- Controls ----------- */\n  .controls {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: clamp(10px, 1.4vw, 14px);\n  }\n\n  .progress-wrap {\n    width: min(82vw, 420px);\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n    align-self: center;\n  }\n  .progress-track {\n    width: 100%;\n    height: 2px;\n    background: rgba(255,255,255,0.08);\n    border-radius: 2px;\n    overflow: hidden;\n  }\n  .progress-fill {\n    height: 100%;\n    background: #fff;\n    width: 0%;\n    transition: width 0.4s ease;\n  }\n  .progress-meta {\n    display: flex;\n    justify-content: space-between;\n    font-family: 'Figtree', sans-serif;\n    font-size: 10px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--muted-2);\n    font-variant-numeric: tabular-nums;\n  }\n  .progress-meta .cat {\n    font-family: 'Instrument Serif', serif;\n    font-style: italic;\n    text-transform: none;\n    letter-spacing: 0;\n    color: var(--muted);\n    font-size: 13px;\n  }\n\n  .nav {\n    display: flex;\n    align-items: center;\n    gap: clamp(10px, 1.6vw, 18px);\n    flex-wrap: wrap;\n    justify-content: center;\n  }\n\n  button {\n    font: inherit;\n    color: inherit;\n    background: none;\n    border: none;\n    cursor: pointer;\n    padding: 0;\n  }\n  button:focus-visible { outline: 2px solid #fff; outline-offset: 3px; border-radius: 999px; }\n\n  .icon-btn {\n    width: 30px;\n    height: 30px;\n    border-radius: 50%;\n    background: rgba(255,255,255,0.06);\n    border: 1px solid rgba(255,255,255,0.12);\n    color: #fff;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;\n  }\n  .icon-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.22); }\n  .icon-btn:active { transform: scale(0.94); }\n  .icon-btn svg { width: 12px; height: 12px; }\n\n  .primary-btn {\n    height: 32px;\n    padding: 0 14px;\n    border-radius: 999px;\n    background: #fff;\n    color: #111;\n    font-family: 'Figtree', sans-serif;\n    font-weight: 600;\n    font-size: 11px;\n    letter-spacing: 0.04em;\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    transition: transform 0.18s ease, background 0.18s ease;\n  }\n  .primary-btn:hover { background: #f1f1f1; }\n  .primary-btn:active { transform: scale(0.97); }\n  .primary-btn svg { width: 11px; height: 11px; }\n\n  .ghost-btn {\n    height: 26px;\n    padding: 0 9px;\n    border-radius: 999px;\n    background: transparent;\n    border: 1px solid rgba(255,255,255,0.18);\n    color: #ddd;\n    font-family: 'Figtree', sans-serif;\n    font-weight: 500;\n    font-size: 9.5px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    display: inline-flex;\n    align-items: center;\n    gap: 5px;\n    transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;\n  }\n  .ghost-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.32); color: #fff; }\n  .ghost-btn svg { width: 10px; height: 10px; }\n  .ghost-btn[data-active=\"true\"] {\n    background: rgba(255,255,255,0.12);\n    border-color: rgba(255,255,255,0.4);\n    color: #fff;\n  }\n\n  .toolbar {\n    display: flex;\n    gap: 10px;\n    flex-wrap: wrap;\n    justify-content: center;\n  }\n\n  /* Toast */\n  .toast {\n    position: fixed;\n    left: 50%;\n    bottom: 24px;\n    transform: translateX(-50%) translateY(20px);\n    background: rgba(0,0,0,0.85);\n    color: #fff;\n    border: 1px solid rgba(255,255,255,0.14);\n    padding: 10px 16px;\n    border-radius: 999px;\n    font-family: 'Figtree', sans-serif;\n    font-size: 12px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    opacity: 0;\n    transition: opacity 0.25s ease, transform 0.25s ease;\n    pointer-events: none;\n    z-index: 50;\n  }\n  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }\n\n  /* Tighter on small screens */\n  @media (max-width: 480px) {\n    .card { max-width: 88vw; }\n    .progress-wrap { width: min(88vw, 420px); }\n    .toolbar .ghost-btn { font-size: 11px; padding: 0 12px; }\n  }\n  @media (max-height: 720px) {\n    .card { --h: min(calc(100vh - 240px), 560px); }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"app\">\n\n  <header class=\"bar\">\n    <div class=\"brand\">Co-Founder Therapy<\u002Fdiv>\n    <div class=\"meta\">\n      <span id=\"indexLabel\">01<\u002Fspan><span style=\"opacity:.4\"> / <\u002Fspan><span id=\"totalLabel\">36<\u002Fspan>\n      <span id=\"orderBadge\" style=\"margin-left:10px\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main class=\"stage\">\n    <div class=\"card\" id=\"card\" role=\"button\" tabindex=\"0\" aria-label=\"Tap to flip card\">\n      <div class=\"face front\" id=\"frontFace\">\n        <div class=\"front-content\">\n          <div class=\"front-top\">\n            <div class=\"category\" id=\"catEl\">Warm-up<\u002Fdiv>\n            <div class=\"number\" id=\"numEl\">01 / 36<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"question\" id=\"qEl\">—<\u002Fdiv>\n          <div class=\"front-bottom\">\n            <span>Co-Founder Therapy<\u002Fspan>\n            <span class=\"brand\">·<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"hint\">Tap card to flip<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"face back\">\n        <div class=\"pattern\" id=\"patternEl\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <div class=\"controls\">\n\n    <div class=\"progress-wrap\">\n      <div class=\"progress-track\"><div class=\"progress-fill\" id=\"progFill\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"progress-meta\">\n        <span class=\"cat\" id=\"catLabel\">Warm-up<\u002Fspan>\n        <span><span id=\"posLabel\">1<\u002Fspan> of <span id=\"posTotal\">36<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"nav\">\n      <button class=\"icon-btn\" id=\"prevBtn\" aria-label=\"Previous card\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"15 18 9 12 15 6\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fbutton>\n\n      <button class=\"primary-btn\" id=\"flipBtn\" aria-label=\"Flip card\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <path d=\"M3 12a9 9 0 0 1 15.5-6.3L21 8\"><\u002Fpath>\n          <polyline points=\"21 3 21 8 16 8\"><\u002Fpolyline>\n          <path d=\"M21 12a9 9 0 0 1-15.5 6.3L3 16\"><\u002Fpath>\n          <polyline points=\"3 21 3 16 8 16\"><\u002Fpolyline>\n        <\u002Fsvg>\n        <span id=\"flipLabel\">Flip<\u002Fspan>\n      <\u002Fbutton>\n\n      <button class=\"icon-btn\" id=\"nextBtn\" aria-label=\"Next card\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"toolbar\">\n      <button class=\"ghost-btn\" id=\"shuffleBtn\" title=\"Shuffle deck (S)\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <polyline points=\"16 3 21 3 21 8\"><\u002Fpolyline>\n          <line x1=\"4\" y1=\"20\" x2=\"21\" y2=\"3\"><\u002Fline>\n          <polyline points=\"21 16 21 21 16 21\"><\u002Fpolyline>\n          <line x1=\"15\" y1=\"15\" x2=\"21\" y2=\"21\"><\u002Fline>\n          <line x1=\"4\" y1=\"4\" x2=\"9\" y2=\"9\"><\u002Fline>\n        <\u002Fsvg>\n        Shuffle\n      <\u002Fbutton>\n      <button class=\"ghost-btn\" id=\"resetBtn\" title=\"Reset to original order (R)\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <polyline points=\"1 4 1 10 7 10\"><\u002Fpolyline>\n          <path d=\"M3.51 15a9 9 0 1 0 2.13-9.36L1 10\"><\u002Fpath>\n        <\u002Fsvg>\n        Reset\n      <\u002Fbutton>\n      <button class=\"ghost-btn\" id=\"filterBtn\" title=\"Filter by category (F)\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <polygon points=\"22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3\"><\u002Fpolygon>\n        <\u002Fsvg>\n        <span id=\"filterLabel\">All categories<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n\n<div class=\"toast\" id=\"toast\"><\u002Fdiv>\n\n<script>\n  // ====== Card data ======\n  const CARDS = [\n    { cat: \"Warm-up\", q: \"What is one memory with this group that still feels really precious to you?\" },\n    { cat: \"Warm-up\", q: \"When have you felt closest to each person here?\" },\n    { cat: \"Warm-up\", q: \"What is something you admire about each person that you do not say often enough?\" },\n    { cat: \"Warm-up\", q: \"What does this group bring out in you at your best?\" },\n    { cat: \"Warm-up\", q: \"What part of our friendship or team dynamic do you most want to protect?\" },\n    { cat: \"Warm-up\", q: \"What is something you feel grateful for from the last year?\" },\n    { cat: \"Warm-up\", q: \"When do you feel most safe, relaxed, or yourself around us?\" },\n\n    { cat: \"Conflict & Repair\", q: \"When you are stressed, hurt, or overwhelmed, what do you tend to do?\" },\n    { cat: \"Conflict & Repair\", q: \"What are your signs that you are not doing okay?\" },\n    { cat: \"Conflict & Repair\", q: \"What helps you come back to yourself when you are spiraling, defensive, or shut down?\" },\n    { cat: \"Conflict & Repair\", q: \"How do you usually want people to approach you when something is wrong?\" },\n    { cat: \"Conflict & Repair\", q: \"What kind of conflict feels productive to you? What kind feels damaging?\" },\n    { cat: \"Conflict & Repair\", q: \"What is a conflict you think we handled well, and why did it work?\" },\n    { cat: \"Conflict & Repair\", q: \"What is a hard moment between us we could have handled better?\" },\n    { cat: \"Conflict & Repair\", q: \"When you feel hurt by someone close to you, what helps you repair?\" },\n    { cat: \"Conflict & Repair\", q: \"What do you need in order to feel safe being honest with this group?\" },\n    { cat: \"Conflict & Repair\", q: \"What is one thing you want us to understand about how you react under pressure?\" },\n\n    { cat: \"Working Together\", q: \"What role do you want to grow into?\" },\n    { cat: \"Working Together\", q: \"What kind of work energizes you most right now?\" },\n    { cat: \"Working Together\", q: \"What kind of work drains you, even if you are good at it?\" },\n    { cat: \"Working Together\", q: \"What do you need from the people around you to do your best work?\" },\n    { cat: \"Working Together\", q: \"What does good communication look like for us going forward?\" },\n    { cat: \"Working Together\", q: \"What decisions should we make sure to talk through together instead of silently assuming?\" },\n    { cat: \"Working Together\", q: \"What cadence would keep us close and aligned — dinners, walks, check-ins, retros?\" },\n\n    { cat: \"Closing\", q: \"What would make you feel truly partnered in this group?\" },\n    { cat: \"Closing\", q: \"What would make this friendship feel stronger six months from now?\" },\n    { cat: \"Closing\", q: \"What is one promise you want from each person here?\" },\n    { cat: \"Closing\", q: \"What is one promise you are willing to make to each person here?\" },\n    { cat: \"Closing\", q: \"What is one thing you are afraid to ask for, but probably need?\" },\n    { cat: \"Closing\", q: \"What is one thing you want to let go of?\" },\n    { cat: \"Closing\", q: \"What would it look like for us to make each other successful?\" },\n    { cat: \"Closing\", q: \"What kind of people do we want to become through working together?\" },\n    { cat: \"Closing\", q: \"When things get hard, what do you want us to remember about each other?\" },\n    { cat: \"Closing\", q: \"At the end of this season, what would make you proud of how we treated each other?\" },\n    { cat: \"Closing\", q: \"What is something you have been carrying alone that you want to share tonight?\" },\n    { cat: \"Closing\", q: \"If this group had a north star we all quietly believed in, what would it be?\" },\n  ];\n\n  const CATEGORIES = [\"All\", \"Warm-up\", \"Conflict & Repair\", \"Working Together\", \"Closing\"];\n\n  // ====== State ======\n  const state = {\n    order: CARDS.map((_, i) => i),  // current sequence of indices into CARDS\n    pos: 0,                          // current position within order\n    flipped: false,\n    shuffled: false,\n    filterIdx: 0,                    // index into CATEGORIES\n  };\n\n  // ====== Build back pattern (once) ======\n  (function buildPattern() {\n    const ROWS = 14, PER_ROW = 8;\n    const el = document.getElementById('patternEl');\n    let html = '';\n    for (let r = 0; r < ROWS; r++) {\n      let row = '<div class=\"row\">';\n      for (let w = 0; w < PER_ROW; w++) row += '<span class=\"word\">Co-Founder Therapy<\u002Fspan>';\n      row += '<\u002Fdiv>';\n      html += row;\n    }\n    el.innerHTML = html;\n  })();\n\n  // ====== DOM refs ======\n  const card = document.getElementById('card');\n  const catEl = document.getElementById('catEl');\n  const numEl = document.getElementById('numEl');\n  const qEl   = document.getElementById('qEl');\n  const indexLabel = document.getElementById('indexLabel');\n  const totalLabel = document.getElementById('totalLabel');\n  const orderBadge = document.getElementById('orderBadge');\n  const progFill   = document.getElementById('progFill');\n  const catLabel   = document.getElementById('catLabel');\n  const posLabel   = document.getElementById('posLabel');\n  const posTotal   = document.getElementById('posTotal');\n  const flipBtn    = document.getElementById('flipBtn');\n  const flipLabel  = document.getElementById('flipLabel');\n  const prevBtn    = document.getElementById('prevBtn');\n  const nextBtn    = document.getElementById('nextBtn');\n  const shuffleBtn = document.getElementById('shuffleBtn');\n  const resetBtn   = document.getElementById('resetBtn');\n  const filterBtn  = document.getElementById('filterBtn');\n  const filterLabel= document.getElementById('filterLabel');\n  const toast      = document.getElementById('toast');\n\n  // ====== Helpers ======\n  function fisherYates(arr) {\n    const a = arr.slice();\n    for (let i = a.length - 1; i > 0; i--) {\n      const j = Math.floor(Math.random() * (i + 1));\n      [a[i], a[j]] = [a[j], a[i]];\n    }\n    return a;\n  }\n\n  function applyFilterAndOrder({ shuffled = state.shuffled } = {}) {\n    const cat = CATEGORIES[state.filterIdx];\n    let base;\n    if (cat === \"All\") {\n      base = CARDS.map((_, i) => i);\n    } else {\n      base = CARDS.map((c, i) => c.cat === cat ? i : -1).filter(i => i >= 0);\n    }\n    state.order = shuffled ? fisherYates(base) : base;\n    state.shuffled = shuffled;\n    state.pos = 0;\n    // keep state.flipped as-is so flipping the deck persists across shuffle/reset/filter\n  }\n\n  function showToast(msg) {\n    toast.textContent = msg;\n    toast.classList.add('show');\n    clearTimeout(showToast._t);\n    showToast._t = setTimeout(() => toast.classList.remove('show'), 1400);\n  }\n\n  // ====== Render ======\n  function renderCard({ animateSwap = false, dir = 1 } = {}) {\n    const total = state.order.length;\n    const cardIdx = state.order[state.pos];\n    const c = CARDS[cardIdx];\n\n    const update = () => {\n      catEl.textContent = c.cat;\n      qEl.textContent   = c.q;\n      // Card numbers always reflect ORIGINAL deck index (so users can find a card later)\n      numEl.textContent = `${String(cardIdx + 1).padStart(2,'0')} / 36`;\n\n      indexLabel.textContent = String(state.pos + 1).padStart(2, '0');\n      totalLabel.textContent = String(total).padStart(2, '0');\n      catLabel.textContent   = c.cat;\n      posLabel.textContent   = state.pos + 1;\n      posTotal.textContent   = total;\n      progFill.style.width   = ((state.pos + 1) / total * 100) + '%';\n\n      orderBadge.textContent = state.shuffled ? '· shuffled' : '';\n      orderBadge.style.color = state.shuffled ? 'rgba(255,255,255,0.55)' : 'transparent';\n\n      // Long-question size adjustment\n      const len = c.q.length;\n      qEl.style.fontSize = len > 110 ? 'clamp(15px, 2.2vw, 21px)'\n                          : len > 78  ? 'clamp(16px, 2.4vw, 23px)'\n                          : '';\n\n      // Preserve flip state across navigation — don't reset it.\n      card.classList.toggle('flipped', state.flipped);\n      flipLabel.textContent = state.flipped ? 'Show question' : 'Flip';\n\n      shuffleBtn.dataset.active = state.shuffled ? 'true' : 'false';\n      filterLabel.textContent = state.filterIdx === 0 ? 'All categories' : CATEGORIES[state.filterIdx];\n    };\n\n    if (!animateSwap) {\n      update();\n      return;\n    }\n\n    card.classList.remove('swap-in');\n    card.classList.add('swap-out', 'no-flip-anim');\n    setTimeout(() => {\n      update();\n      card.classList.remove('swap-out');\n      card.classList.add('swap-in');\n      // re-enable the flip transition after the new face is in place\n      requestAnimationFrame(() => requestAnimationFrame(() => {\n        card.classList.remove('no-flip-anim');\n      }));\n      setTimeout(() => card.classList.remove('swap-in'), 350);\n    }, 220);\n  }\n\n  // ====== Actions ======\n  function go(delta) {\n    const total = state.order.length;\n    if (total === 0) return;\n    const next = state.pos + delta;\n    if (next < 0 || next >= total) {\n      // bounce feedback\n      card.animate(\n        [\n          { transform: card.classList.contains('flipped') ? 'rotateY(180deg) translateX(0)' : 'translateX(0)' },\n          { transform: card.classList.contains('flipped') ? `rotateY(180deg) translateX(${delta>0?-10:10}px)` : `translateX(${delta>0?10:-10}px)` },\n          { transform: card.classList.contains('flipped') ? 'rotateY(180deg) translateX(0)' : 'translateX(0)' },\n        ],\n        { duration: 240, easing: 'ease-out' }\n      );\n      showToast(delta > 0 ? 'End of deck' : 'Start of deck');\n      return;\n    }\n    state.pos = next;\n    renderCard({ animateSwap: true, dir: delta });\n  }\n\n  function flip() {\n    state.flipped = !state.flipped;\n    card.classList.remove('settled');\n    card.classList.toggle('flipped', state.flipped);\n    flipLabel.textContent = state.flipped ? 'Show question' : 'Flip';\n    document.body.classList.remove('show-hint');\n    // Re-add 'settled' once the rotateY transition (~0.7s) finishes.\n    // Using a timer instead of transitionend because nav-swap mutates\n    // many properties, sending stray transitionend events that desync state.\n    clearTimeout(flip._t);\n    flip._t = setTimeout(() => card.classList.add('settled'), 720);\n  }\n\n  function shuffle() {\n    applyFilterAndOrder({ shuffled: true });\n    renderCard({ animateSwap: true });\n    document.body.classList.remove('show-hint');\n    showToast('Shuffled');\n  }\n\n  function resetOrder() {\n    applyFilterAndOrder({ shuffled: false });\n    renderCard({ animateSwap: true });\n    document.body.classList.remove('show-hint');\n    showToast('Order reset');\n  }\n\n  function cycleFilter() {\n    state.filterIdx = (state.filterIdx + 1) % CATEGORIES.length;\n    applyFilterAndOrder({ shuffled: state.shuffled });\n    renderCard({ animateSwap: true });\n    showToast(state.filterIdx === 0 ? 'All categories' : CATEGORIES[state.filterIdx]);\n    document.body.classList.remove('show-hint');\n  }\n\n  // Show the hint only on first paint (it auto-hides on first interaction).\n  document.body.classList.add('show-hint');\n\n  // ====== Wire up ======\n  card.addEventListener('click', flip);\n  // Initial state: card is at rest on first paint.\n  card.classList.add('settled');\n  card.addEventListener('keydown', (e) => {\n    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }\n  });\n  flipBtn.addEventListener('click', (e) => { e.stopPropagation(); flip(); });\n  prevBtn.addEventListener('click', () => { document.body.classList.remove('show-hint'); go(-1); });\n  nextBtn.addEventListener('click', () => { document.body.classList.remove('show-hint'); go(1); });\n  shuffleBtn.addEventListener('click', shuffle);\n  resetBtn.addEventListener('click', resetOrder);\n  filterBtn.addEventListener('click', cycleFilter);\n\n  // Keyboard\n  window.addEventListener('keydown', (e) => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (e.key === 'ArrowRight') { e.preventDefault(); document.body.classList.remove('show-hint'); go(1); }\n    else if (e.key === 'ArrowLeft') { e.preventDefault(); document.body.classList.remove('show-hint'); go(-1); }\n    else if (e.key === ' ' || e.key === 'f' || e.key === 'F') { e.preventDefault(); flip(); }\n    else if (e.key === 's' || e.key === 'S') { shuffle(); }\n    else if (e.key === 'r' || e.key === 'R') { resetOrder(); }\n    else if (e.key === 'c' || e.key === 'C') { cycleFilter(); }\n  });\n\n  // Swipe (touch)\n  let touchStart = null;\n  card.addEventListener('touchstart', (e) => {\n    if (e.touches.length !== 1) return;\n    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };\n  }, { passive: true });\n  card.addEventListener('touchend', (e) => {\n    if (!touchStart) return;\n    const t = e.changedTouches[0];\n    const dx = t.clientX - touchStart.x;\n    const dy = t.clientY - touchStart.y;\n    const dt = Date.now() - touchStart.t;\n    touchStart = null;\n    if (dt < 600 && Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.3) {\n      // Horizontal swipe — navigate; suppress the click-to-flip\n      card._suppressClick = true;\n      setTimeout(() => card._suppressClick = false, 350);\n      go(dx < 0 ? 1 : -1);\n    }\n  });\n  card.addEventListener('click', (e) => {\n    if (card._suppressClick) e.stopImmediatePropagation();\n  }, true);\n\n  // ====== Init ======\n  renderCard();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
